# 3001 - Admin (정적)
server {
    listen 3001;
    server_name _;
    include /etc/nginx/conf.d/_api-proxy.conf;

    root /app/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
