name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            # client 레포 최신화
            git -C ${{ vars.CLIENT_DIR }} fetch origin
            git -C ${{ vars.CLIENT_DIR }} checkout main
            git -C ${{ vars.CLIENT_DIR }} pull origin main
            # 프론트(admin + 활성 client)만 재빌드·재생성
            cd ${{ vars.INFRA_DIR }}
            PROFILE=$(grep -E '^COMPOSE_PROFILES=' .env | cut -d= -f2)
            test -n "$PROFILE" || { echo "COMPOSE_PROFILES not set in .env"; exit 1; }
            docker compose up -d --build --no-deps admin "client-${PROFILE}"
            docker image prune -f
